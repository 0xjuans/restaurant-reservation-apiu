server:
  port: 8084

spring:
  application:
    name: reservation-service
  profiles:
    active: local
  datasource:
    url: jdbc:postgresql://localhost:5432/restaurant_db?currentSchema=reservations
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        default_schema: reservations
        format_sql: true
  flyway:
    schemas: reservations
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
