server:
  port: 8083

spring:
  profiles:
    active: local
  application:
    name: table-service
  datasource:
    url: jdbc:postgresql://localhost:5432/restaurant_db?currentSchema=tables
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        default_schema: tables
        format_sql: true
  flyway:
    schemas: tables
    locations: classpath:db/migration

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

jwt:
  secret: ${JWT_SECRET}
