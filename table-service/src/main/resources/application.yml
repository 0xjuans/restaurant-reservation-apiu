server:
  port: 8083

spring:
  application:
    name: table-service
  datasource:
    url: jdbc:postgresql://localhost:5432/restaurant_db?currentSchema=tables
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        default_schema: tables
        format_sql: true
  flyway:
    schemas: tables
    locations: classpath:db/migration
  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
